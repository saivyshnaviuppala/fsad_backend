# ===============================
# DATABASE CONFIG
# ===============================
# Added useSSL=false + allowPublicKeyRetrieval=true for MySQL 8 auth compatibility
# createDatabaseIfNotExist=true auto-creates the schema on first run
spring.datasource.url=jdbc:mysql://localhost:3306/mutualfunds?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=saivyshnaviuppala
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# MySQLDialect is auto-detected in Hibernate 6 — no need to specify explicitly
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG (VERY IMPORTANT)
# ===============================
# JwtUtil decodes this with Base64 (Decoders.BASE64.decode) and then
# derives an HMAC-SHA256 key — so the value MUST be a valid Base64 string
# of at least 32 decoded bytes (256 bits).
#
# "praneethsecretkey123456" encoded to Base64:
#   echo -n "praneethsecretkey1234567890abcd" | base64
#   → cHJhbmVldGhzZWNyZXRrZXkxMjM0NTY3ODkwYWJjZA==
#
# Base64 of "MySuperSecureJWTSecretKeyForMutualFundProject123456789"
# echo -n "MySuperSecureJWTSecretKeyForMutualFundProject123456789" | base64
app.jwt.secret=bXV0dWFsZnVuZHNlY3JldGtleWZvcmhtYWMyNTZhdXRoZW50aWNhdGlvbjEyMzQ=
app.jwt.expiration-ms=86400000

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# SPRINGDOC / SWAGGER UI
# ===============================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.override-with-generic-response=false